<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Avni ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    text-align: center;
    color: white;
}

.container {
    margin-top: 30px;
}

img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
}

h1 {
    margin-top: 15px;
}

button {
    padding: 12px 20px;
    background: #ff4b5c;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 20px;
}

.hidden {
    display: none;
}

.heart {
    font-size: 50px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
</style>

</head>
<body>

<div class="container">


    <!-- 📸 ADD YOUR PHOTO HERE -->
    <img src="your-photo.jpg" alt="Avni">

    <h1>Hey Avni 💖</h1>
    <p>You are the most special person in my life 😊</p>

    <button onclick="showMessage()">Click Here ❤️</button>

    <div id="message" class="hidden">
        <p>I’m really lucky to have you 💞</p>
        <div class="heart">❤️</div>
    </div>

</div>

<script>
function showMessage() {
    document.getElementById("message").classList.remove("hidden");
}
</script>

</body>
</html>
